<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的知识库助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; display: flex; height: 100vh; }
    .sidebar { width: 280px; background: #1e293b; color: white; display: flex; flex-direction: column; padding: 1rem; }
    .sidebar h2 { font-size: 1rem; margin-bottom: 1rem; color: #94a3b8; }
    .sidebar button { width: 100%; padding: 0.75rem; margin-bottom: 0.5rem; border: none; border-radius: 0.5rem; cursor: pointer; text-align: left; font-size: 0.9rem; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .sessions-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 0.5rem; border-radius: 0.5rem; cursor: pointer; margin-bottom: 0.25rem; font-size: 0.85rem; }
    .session-item:hover { background: #334155; }
    .session-item.active { background: #2563eb; }
    .main-content { flex: 1; display: flex; flex-direction: column; }
    .header { padding: 1rem 1.5rem; background: white; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1rem; color: #1e293b; }
    .header-actions { display: flex; gap: 0.5rem; }
    .tab-bar { display: flex; background: #e2e8f0; }
    .tab { padding: 0.75rem 1.5rem; cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; }
    .tab.active { background: white; border-bottom-color: #2563eb; color: #2563eb; }
    .chat-container { flex: 1; display: flex; flex-direction: column; background: white; }
    .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .message { padding: 0.75rem 1rem; border-radius: 1rem; max-width: 80%; word-wrap: break-word; }
    .user { align-self: flex-end; background: #dbeafe; color: #1e3a8a; }
    .assistant { align-self: flex-start; background: #f1f5f9; color: #0f172a; }
    .input-area { display: flex; padding: 1rem; border-top: 1px solid #e2e8f0; }
    .input-area input { flex: 1; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 0.75rem; font-size: 1rem; outline: none; }
    .input-area button { margin-left: 0.75rem; padding: 0.75rem 1.5rem; background: #2563eb; color: white; border: none; border-radius: 0.75rem; font-size: 1rem; cursor: pointer; }
    .input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
    .panel { flex: 1; padding: 1rem; overflow-y: auto; display: none; }
    .panel.active { display: block; }
    .stats-card { background: #f8fafc; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; }
    .stats-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #e2e8f0; }
    .stats-row:last-child { border-bottom: none; }
    .stats-label { color: #64748b; }
    .stats-value { font-weight: 600; color: #1e293b; }
    .chunk-list { max-height: 400px; overflow-y: auto; }
    .chunk-item { background: #f8fafc; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .chunk-id { color: #64748b; font-size: 0.75rem; margin-bottom: 0.25rem; }
    .chunk-content { color: #1e293b; }
    .logs-panel { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; font-family: monospace; font-size: 0.85rem; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .terminal-input { width: 100%; padding: 0.5rem; border: 1px solid #475569; border-radius: 0.5rem; background: #334155; color: white; font-family: monospace; font-size: 0.85rem; outline: none; }
    .terminal-output { margin-top: 1rem; padding: 0.5rem; background: #0f172a; border-radius: 0.5rem; font-size: 0.85rem; }
    .error { color: #ef4444; }
    .success { color: #22c55e; }
    .pagination { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .pagination button { padding: 0.5rem 1rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; background: white; cursor: pointer; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .search-box { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>会话</h2>
    <button class="btn-primary" onclick="createNewSession()">+ 新对话</button>
    <div class="sessions-list" id="sessionsList">
      <div class="session-item active" data-session-id="current">当前会话</div>
    </div>
    <h2 style="margin-top: 1rem;">系统</h2>
    <button class="btn-secondary" onclick="showTab('database')">📊 数据库</button>
    <button class="btn-secondary" onclick="showTab('logs')">📝 日志</button>
    <button class="btn-secondary" onclick="showTab('terminal')">💻 终端</button>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>📚 我的知识库助手</h1>
      <div class="header-actions">
        <button class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="loadHistory()">刷新历史</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab active" id="tab-chat" onclick="showTab('chat')">聊天</div>
      <div class="tab" id="tab-history" onclick="showTab('history')">历史记录</div>
      <div class="tab" id="tab-database" onclick="showTab('database')">数据库</div>
      <div class="tab" id="tab-logs" onclick="showTab('logs')">日志</div>
      <div class="tab" id="tab-terminal" onclick="showTab('terminal')">终端</div>
    </div>

    <div class="chat-container panel active" id="panel-chat">
      <div class="messages" id="messages">
        <div class="message assistant">你好！我已加载你的文档，可以开始提问了。</div>
      </div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..." autofocus />
        <button id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>

    <div class="panel" id="panel-history">
      <h3>会话历史</h3>
      <div id="historyContent" style="margin-top: 1rem;">
        <p>选择左侧会话查看历史记录</p>
      </div>
    </div>

    <div class="panel" id="panel-database">
      <div class="stats-card">
        <h3>数据库统计</h3>
        <div id="dbStats">
          <div class="stats-row"><span class="stats-label">文档片段数:</span><span class="stats-value">加载中...</span></div>
          <div class="stats-row"><span class="stats-label">集合:</span><span class="stats-value">加载中...</span></div>
        </div>
      </div>
      <input type="text" class="search-box" id="dbSearchInput" placeholder="搜索数据库内容..." onkeyup="if(event.key=='Enter') searchDB()">
      <button class="btn-primary" style="margin-bottom: 1rem;" onclick="searchDB()">搜索</button>
      <h3>数据库内容</h3>
      <div id="dbChunks" class="chunk-list">加载中...</div>
      <div class="pagination" id="dbPagination"></div>
    </div>

    <div class="panel" id="panel-logs">
      <h3>系统日志</h3>
      <div id="logsContent" class="logs-panel">加载中...</div>
    </div>

    <div class="panel" id="panel-terminal">
      <h3>终端查询</h3>
      <input type="text" class="terminal-input" id="terminalInput" placeholder="输入命令: /stats, /search [query], /chunks, /sessions" onkeyup="if(event.key=='Enter') executeCommand()">
      <div id="terminalOutput" class="terminal-output"></div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let SESSION_ID = localStorage.getItem('currentSession') || 'session-' + Date.now();
    localStorage.setItem('currentSession', SESSION_ID);

    function showTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      document.getElementById('panel-' + tabName).classList.add('active');
      
      if (tabName === 'database') loadDBStats();
      if (tabName === 'logs') loadLogs();
      if (tabName === 'terminal') loadSessions();
    }

    async function createNewSession() {
      try {
        const response = await fetch(`${API_BASE}/new_session`, { method: 'POST' });
        const data = await response.json();
        SESSION_ID = data.session_id;
        localStorage.setItem('currentSession', SESSION_ID);
        document.getElementById('messages').innerHTML = '<div class="message assistant">你好！开始新的对话。</div>';
        document.querySelectorAll('.session-item').forEach(s => s.classList.remove('active'));
        document.querySelector('.sessions-list').innerHTML = `<div class="session-item active" data-session-id="${SESSION_ID}">${formatTime(new Date())}</div>`;
        showTab('chat');
      } catch (error) {
        alert('创建会话失败: ' + error.message);
      }
    }

    async function loadSessions() {
      try {
        const response = await fetch(`${API_BASE}/sessions`);
        const data = await response.json();
        const list = document.getElementById('sessionsList');
        list.innerHTML = data.sessions.map(s => 
          `<div class="session-item ${s.session_id === SESSION_ID ? 'active' : ''}" data-session-id="${s.session_id}" onclick="switchSession('${s.session_id}')">${formatTime(new Date(s.created_at))} (${s.message_count}条)</div>`
        ).join('');
      } catch (error) {
        console.error('加载会话列表失败:', error);
      }
    }

    function switchSession(sessionId) {
      SESSION_ID = sessionId;
      localStorage.setItem('currentSession', sessionId);
      document.querySelectorAll('.session-item').forEach(s => s.classList.remove('active'));
      document.querySelector(`[data-session-id="${sessionId}"]`).classList.add('active');
      loadHistoryForSession(sessionId);
      showTab('chat');
    }

    async function loadHistoryForSession(sessionId) {
      try {
        const response = await fetch(`${API_BASE}/history/${sessionId}`);
        const data = await response.json();
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = data.history.map(h => 
          `<div class="message user">${h.user}</div><div class="message assistant">${h.assistant}</div>`
        ).join('') || '<div class="message assistant">开始新对话</div>';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      } catch (error) {
        console.error('加载历史失败:', error);
      }
    }

    function loadHistory() {
      loadHistoryForSession(SESSION_ID);
      loadSessions();
    }

    function formatTime(date) {
      return date.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(role, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.textContent = text;
      document.getElementById('messages').appendChild(msgDiv);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    async function sendMessage() {
      const query = document.getElementById('userInput').value.trim();
      if (!query) return;
      addMessage('user', query);
      document.getElementById('userInput').value = '';
      document.getElementById('sendBtn').disabled = true;

      const loadingMsg = document.createElement('div');
      loadingMsg.className = 'message assistant';
      loadingMsg.textContent = '思考中...';
      document.getElementById('messages').appendChild(loadingMsg);

      try {
        const response = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION_ID, query: query })
        });
        if (!response.ok) throw new Error(`请求失败 (${response.status})`);
        const data = await response.json();
        document.getElementById('messages').removeChild(loadingMsg);
        addMessage('assistant', data.answer);
      } catch (error) {
        document.getElementById('messages').removeChild(loadingMsg);
        addMessage('assistant', '❌ 出错：' + error.message);
      } finally {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('userInput').focus();
      }
    }

    async function loadDBStats() {
      try {
        const response = await fetch(`${API_BASE}/db/stats`);
        const data = await response.json();
        document.getElementById('dbStats').innerHTML = `
          <div class="stats-row"><span class="stats-label">文档片段数:</span><span class="stats-value">${data.total_chunks}</span></div>
          <div class="stats-row"><span class="stats-label">集合:</span><span class="stats-value">${data.collections.join(', ')}</span></div>
        `;
      } catch (error) {
        document.getElementById('dbStats').innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
      }
    }

    async function loadDBChunks(offset = 0, limit = 20) {
      try {
        const response = await fetch(`${API_BASE}/db/chunks?limit=${limit}&offset=${offset}`);
        const data = await response.json();
        document.getElementById('dbChunks').innerHTML = data.chunks.map(c => 
          `<div class="chunk-item"><div class="chunk-id">ID: ${c.id}</div><div class="chunk-content">${c.content}</div></div>`
        ).join('');
        
        const total = data.total;
        const pages = Math.ceil(total / limit);
        const currentPage = Math.floor(offset / limit) + 1;
        let pagination = '';
        if (currentPage > 1) pagination += `<button onclick="loadDBChunks(${offset - limit})">上一页</button>`;
        pagination += `<span style="padding: 0.5rem;">第 ${currentPage}/${pages} 页</span>`;
        if (currentPage < pages) pagination += `<button onclick="loadDBChunks(${offset + limit})">下一页</button>`;
        document.getElementById('dbPagination').innerHTML = pagination;
      } catch (error) {
        document.getElementById('dbChunks').innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
      }
    }

    async function searchDB() {
      const query = document.getElementById('dbSearchInput').value.trim();
      if (!query) {
        loadDBChunks();
        return;
      }
      try {
        const response = await fetch(`${API_BASE}/db/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query, k: 10 })
        });
        const data = await response.json();
        document.getElementById('dbChunks').innerHTML = data.results.map(r => 
          `<div class="chunk-item"><div class="chunk-id">匹配结果 #${r.id}</div><div class="chunk-content">${r.content}</div></div>`
        ).join('');
        document.getElementById('dbPagination').innerHTML = '';
      } catch (error) {
        document.getElementById('dbChunks').innerHTML = `<div class="error">搜索失败: ${error.message}</div>`;
      }
    }

    async function loadLogs() {
      try {
        const response = await fetch(`${API_BASE}/logs?lines=100`);
        const data = await response.json();
        document.getElementById('logsContent').textContent = data.logs;
      } catch (error) {
        document.getElementById('logsContent').textContent = '加载日志失败: ' + error.message;
      }
    }

    async function executeCommand() {
      const cmd = document.getElementById('terminalInput').value.trim();
      if (!cmd) return;
      
      const output = document.getElementById('terminalOutput');
      output.innerHTML += `> ${cmd}\n`;
      document.getElementById('terminalInput').value = '';

      try {
        let result;
        if (cmd === '/stats') {
          const response = await fetch(`${API_BASE}/db/stats`);
          result = await response.json();
          output.innerHTML += `<span class="success">数据库统计:</span>\n`;
          output.innerHTML += `  文档片段数: ${result.total_chunks}\n`;
          output.innerHTML += `  集合: ${result.collections.join(', ')}\n`;
        } else if (cmd.startsWith('/search ')) {
          const query = cmd.replace('/search ', '');
          const response = await fetch(`${API_BASE}/db/search`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query, k: 5 })
          });
          result = await response.json();
          output.innerHTML += `<span class="success">搜索结果 (${result.results.length}条):</span>\n`;
          result.results.forEach((r, i) => {
            output.innerHTML += `  [${i+1}] ${r.content.substring(0, 100)}...\n`;
          });
        } else if (cmd === '/chunks') {
          const response = await fetch(`${API_BASE}/db/chunks?limit=10`);
          result = await response.json();
          output.innerHTML += `<span class="success">前10条文档片段:</span>\n`;
          result.chunks.forEach(c => {
            output.innerHTML += `  ${c.id.substring(0, 8)}: ${c.content.substring(0, 80)}...\n`;
          });
        } else if (cmd === '/sessions') {
          const response = await fetch(`${API_BASE}/sessions`);
          result = await response.json();
          output.innerHTML += `<span class="success">当前会话 (${result.sessions.length}个):</span>\n`;
          result.sessions.forEach(s => {
            output.innerHTML += `  ${s.session_id.substring(0, 20)}... - ${s.message_count}条消息\n`;
          });
        } else if (cmd === '/help') {
          output.innerHTML += `<span class="success">可用命令:</span>\n`;
          output.innerHTML += `  /stats      - 查看数据库统计\n`;
          output.innerHTML += `  /search q   - 搜索数据库内容\n`;
          output.innerHTML += `  /chunks     - 查看前10条文档片段\n`;
          output.innerHTML += `  /sessions   - 查看当前会话列表\n`;
          output.innerHTML += `  /help       - 显示此帮助\n`;
        } else {
          output.innerHTML += `<span class="error">未知命令: ${cmd}</span>\n`;
          output.innerHTML += `输入 /help 查看可用命令\n`;
        }
      } catch (error) {
        output.innerHTML += `<span class="error">执行失败: ${error.message}</span>\n`;
      }
      output.scrollTop = output.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    loadSessions();
    loadDBChunks();
  </script>
</body>
</html>
